name: Release Suwol Tools

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write
  actions: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  NODE_VERSION: 22

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_tag: ${{ steps.version.outputs.is_tag }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          is_tag=false
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            [[ "${GITHUB_REF_NAME}" == "v${version}" ]] || { echo "Tag ${GITHUB_REF_NAME} does not match v${version}"; exit 1; }
            is_tag=true
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "is_tag=${is_tag}" >> "$GITHUB_OUTPUT"

  windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: npm
      - run: npm ci
      - run: npm run prepare:icons
      - run: npm run prepare:ffmpeg
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run package:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - run: node scripts/package-smoke-test.mjs win
      - run: node scripts/collect-release-artifact.mjs win
      - uses: actions/upload-artifact@v4
        with:
          name: suwol-tools-win-x64
          path: release-artifacts/*
          if-no-files-found: error

  linux:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: npm
      - name: Install runtime libraries
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libgtk-3-0 libnss3 libxss1 libasound2t64 libgbm1 libfuse2
      - run: npm ci
      - run: npm run prepare:icons
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - name: Configure FFmpeg resource
        shell: bash
        run: |
          path=$(command -v ffmpeg)
          echo "SUWOL_FFMPEG_LINUX_X64=${path}" >> "$GITHUB_ENV"
          echo "SUWOL_FFMPEG_LINUX_X64_SHA256=$(sha256sum "$path" | cut -d' ' -f1)" >> "$GITHUB_ENV"
          echo "SUWOL_FFMPEG_LINUX_X64_SOURCE=Ubuntu ffmpeg package" >> "$GITHUB_ENV"
      - run: npm run package:linux
      - run: node scripts/generate-update-metadata.mjs linux
      - run: node scripts/validate-update-metadata.mjs linux
      - run: node scripts/package-smoke-test.mjs linux
      - run: node scripts/collect-release-artifact.mjs linux
      - uses: actions/upload-artifact@v4
        with:
          name: suwol-tools-linux-x64
          path: release-artifacts/*
          if-no-files-found: error

  macos-validation:
    name: Validate existing Mac Studio runner
    needs: prepare
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: npm
      - name: Validate host, keychain, signing identity, and secret access
        shell: bash
        env:
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}
          MAC_KEYCHAIN_PASSWORD: ${{ secrets.MAC_KEYCHAIN_PASSWORD }}
          NOTARYTOOL_PROFILE: suwol-notary-profile
          MAC_DEVELOPER_IDENTITY: Developer ID Application
        run: |
          set -euo pipefail
          echo "runner=$(hostname)"
          echo "architecture=$(uname -m)"
          sysctl -n hw.model 2>/dev/null || true
          [[ "$(uname -m)" == "arm64" ]] || { echo "Expected arm64 runner"; exit 1; }
          node --version
          npm --version

          missing=()
          for name in APPLE_APP_SPECIFIC_PASSWORD APPLE_ID APPLE_TEAM_ID CSC_KEY_PASSWORD CSC_LINK GPG_PASSPHRASE GPG_PRIVATE_KEY_B64 MAC_KEYCHAIN_PASSWORD; do
            if [[ -n "${!name:-}" ]]; then
              echo "secret_${name}=available"
            else
              echo "secret_${name}=unavailable"
              missing+=("$name")
            fi
          done
          [[ "${#missing[@]}" -eq 0 ]] || { printf '::error::Required organization secrets are not available to this repository: %s\n' "${missing[*]}"; exit 1; }

          login_keychain="$HOME/Library/Keychains/login.keychain-db"
          [[ -f "$login_keychain" ]] || { echo "login keychain not found: $login_keychain"; exit 1; }
          security unlock-keychain -p "$MAC_KEYCHAIN_PASSWORD" "$login_keychain"
          security set-keychain-settings -lut 21600 "$login_keychain"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MAC_KEYCHAIN_PASSWORD" "$login_keychain"
          security default-keychain -s "$login_keychain"
          security list-keychains -d user -s "$login_keychain"
          security find-identity -v -p codesigning | grep -F "$MAC_DEVELOPER_IDENTITY"

          if xcrun notarytool history --keychain-profile "$NOTARYTOOL_PROFILE" >/dev/null 2>&1; then
            echo "notary_profile=existing"
          else
            xcrun notarytool store-credentials "$NOTARYTOOL_PROFILE" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD"
            xcrun notarytool history --keychain-profile "$NOTARYTOOL_PROFILE" >/dev/null
            echo "notary_profile=created"
          fi
      - name: Install dependencies and verify FFmpeg
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          ffmpeg_path="$(node -p "require('ffmpeg-static')")"
          export SUWOL_FFMPEG_MAC_ARM64="$ffmpeg_path"
          export SUWOL_FFMPEG_MAC_ARM64_SHA256="$(shasum -a 256 "$ffmpeg_path" | cut -d' ' -f1)"
          export SUWOL_FFMPEG_MAC_ARM64_SOURCE="ffmpeg-static pinned package"
          npm run prepare:ffmpeg
          test -x build/ffmpeg/mac-arm64/ffmpeg
          node --input-type=module <<'NODE'
          import { createHash } from "node:crypto";
          import { readFile } from "node:fs/promises";
          const manifest = JSON.parse(await readFile("build/ffmpeg/manifest.json", "utf8"));
          const bytes = await readFile("build/ffmpeg/mac-arm64/ffmpeg");
          const digest = createHash("sha256").update(bytes).digest("hex");
          if (manifest.binaries["mac-arm64"]?.sha256 !== digest) throw new Error("FFmpeg manifest digest mismatch");
          console.log("FFmpeg mac-arm64 SHA-256 verified");
          NODE
      - name: Verify electron-builder can create a signed app
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          REQUIRE_MAC_SIGNING: 1
        run: |
          set -euo pipefail
          ffmpeg_path="$(node -p "require('ffmpeg-static')")"
          export SUWOL_FFMPEG_MAC_ARM64="$ffmpeg_path"
          export SUWOL_FFMPEG_MAC_ARM64_SHA256="$(shasum -a 256 "$ffmpeg_path" | cut -d' ' -f1)"
          export SUWOL_FFMPEG_MAC_ARM64_SOURCE="ffmpeg-static pinned package"
          npm run package:mac:release
          codesign --verify --deep --strict --verbose=2 "release/mac-arm64/Suwol Tools.app"
          spctl --assess --type execute --verbose "release/mac-arm64/Suwol Tools.app"
          echo "signed_validation_app=true"

  publish-core-release:
    needs: [prepare, windows, linux]
    if: needs.prepare.outputs.is_tag == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          pattern: suwol-tools-*
          path: release-downloads
          merge-multiple: true
      - name: Create and verify checksums
        shell: bash
        env:
          GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          npm run release:checksums -- release-downloads
          test -n "$GPG_PRIVATE_KEY_B64" && test -n "$GPG_PASSPHRASE"
          export GNUPGHOME="$RUNNER_TEMP/gnupg"
          trap 'rm -rf "$GNUPGHOME"' EXIT
          mkdir -m 700 "$GNUPGHOME"
          echo "$GPG_PRIVATE_KEY_B64" | base64 --decode | gpg --batch --import
          gpg --batch --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --detach-sign --armor release-downloads/checksums.txt
          (cd release-downloads && sha256sum -c checksums.txt)
          gpg --verify release-downloads/checksums.txt.asc release-downloads/checksums.txt
      - name: Publish Windows and Linux assets
        env:
          GH_TOKEN: "${{ github.token }}"
        run: |
          cp suwol-release-public-key.asc release-downloads/ 2>/dev/null || true
          notes="docs/release-notes-${GITHUB_REF_NAME#v}.md"
          [[ -f "$notes" ]] || notes="docs/release-notes-template.md"
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || gh release create "${GITHUB_REF_NAME}" --title "Suwol Tools ${GITHUB_REF_NAME#v}" --notes-file "$notes"
          gh release upload "${GITHUB_REF_NAME}" release-downloads/* --clobber
          gh release delete-asset "${GITHUB_REF_NAME}" latest.yml --yes 2>/dev/null || true

  macos:
    needs: [prepare, publish-core-release]
    if: needs.prepare.outputs.is_tag == 'true'
    continue-on-error: true
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: npm
      - name: Validate signing and unlock keychain
        env:
          MAC_KEYCHAIN_PASSWORD: ${{ secrets.MAC_KEYCHAIN_PASSWORD }}
          MAC_DEVELOPER_IDENTITY: Developer ID Application
        run: |
          security unlock-keychain -p "$MAC_KEYCHAIN_PASSWORD" ~/Library/Keychains/login.keychain-db
          security set-keychain-settings -lut 21600 ~/Library/Keychains/login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MAC_KEYCHAIN_PASSWORD" ~/Library/Keychains/login.keychain-db
          security find-identity -v -p codesigning | grep -F "$MAC_DEVELOPER_IDENTITY"
      - name: Configure notarization profile
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          NOTARYTOOL_PROFILE: suwol-notary-profile
        run: |
          set -euo pipefail
          if ! xcrun notarytool history --keychain-profile "$NOTARYTOOL_PROFILE" >/dev/null 2>&1; then
            test -n "${APPLE_ID:-}" && test -n "${APPLE_TEAM_ID:-}" && test -n "${APPLE_APP_SPECIFIC_PASSWORD:-}"
            xcrun notarytool store-credentials "$NOTARYTOOL_PROFILE" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD"
          fi
          xcrun notarytool history --keychain-profile "$NOTARYTOOL_PROFILE" >/dev/null
      - run: npm ci
      - run: npm run prepare:icons
      - name: Configure bundled FFmpeg
        run: |
          path=$(node -p "require('ffmpeg-static')")
          echo "SUWOL_FFMPEG_MAC_ARM64=$path" >> "$GITHUB_ENV"
          echo "SUWOL_FFMPEG_MAC_ARM64_SHA256=$(shasum -a 256 "$path" | cut -d' ' -f1)" >> "$GITHUB_ENV"
          echo "SUWOL_FFMPEG_MAC_ARM64_SOURCE=ffmpeg-static pinned package" >> "$GITHUB_ENV"
          echo "REQUIRE_MAC_SIGNING=1" >> "$GITHUB_ENV"
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run package:mac:release
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_KEYCHAIN: login
          REQUIRE_MAC_SIGNING: 1
      - name: Verify signed application
        run: |
          codesign --verify --deep --strict "release/mac-arm64/Suwol Tools.app"
          spctl --assess --type execute --verbose "release/mac-arm64/Suwol Tools.app"
      - run: node scripts/generate-update-metadata.mjs mac
      - run: node scripts/validate-update-metadata.mjs mac
      - run: node scripts/notarize-dmg.mjs
      - name: Verify stapled DMG and notarized app
        shell: bash
        run: |
          set -euo pipefail
          dmg=$(find release -maxdepth 1 -type f -name '*-mac-arm64.dmg' -print -quit)
          test -n "$dmg"
          xcrun stapler validate -v "$dmg"
          spctl --assess --type execute --verbose "release/mac-arm64/Suwol Tools.app"
      - run: node scripts/collect-release-artifact.mjs mac
      - run: node scripts/package-smoke-test.mjs mac
      - run: echo ready > release-artifacts/macos-ready.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: suwol-tools-mac-arm64
          path: release-artifacts/*
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: suwol-tools-mac-diagnostics
          path: diagnostics/*
          if-no-files-found: ignore

  attach-macos:
    needs: [prepare, publish-core-release, macos]
    if: always() && needs.prepare.outputs.is_tag == 'true' && needs.publish-core-release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: suwol-tools-mac-arm64
          path: mac-artifacts
      - name: Attach macOS assets only after ready marker
        env:
          GH_TOKEN: ${{ github.token }}
          GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        shell: bash
        run: |
          test -f mac-artifacts/macos-ready.txt || { echo "macOS build is not ready; core release remains unchanged"; exit 0; }
          gh release download "${GITHUB_REF_NAME}" --dir release-downloads
          cp mac-artifacts/Suwol\ Tools-* mac-artifacts/latest-mac.yml release-downloads/
          rm -f release-downloads/checksums.txt release-downloads/checksums.txt.asc
          npm run release:checksums -- release-downloads
          export GNUPGHOME="$RUNNER_TEMP/gnupg"
          trap 'rm -rf "$GNUPGHOME"' EXIT
          mkdir -m 700 "$GNUPGHOME"
          echo "$GPG_PRIVATE_KEY_B64" | base64 --decode | gpg --batch --import
          gpg --batch --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --detach-sign --armor release-downloads/checksums.txt
          (cd release-downloads && sha256sum -c checksums.txt)
          gpg --verify release-downloads/checksums.txt.asc release-downloads/checksums.txt
          gh release upload "${GITHUB_REF_NAME}" release-downloads/* --clobber
